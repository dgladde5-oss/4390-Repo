<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Membership Plan</title>
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="styleguide.css" />
    <link rel="stylesheet" href="purchaseMemebershipPageStyles.css" />
  </head>
  <body>
    <main class="membership-plan-page">
      <!-- Header background and divider -->
      <img class="rectangle" src="img/rectangle-22.svg" alt="" aria-hidden="true" />
      <img class="line" src="img/line-5.svg" alt="" aria-hidden="true" />
      <!-- User profile section -->
      <section class="user-profile-section" aria-label="User profile">
        <div class="account-profile" role="img" aria-label="User profile picture"></div>
        <span class="text-wrapper">User123</span>
      </section>
      <!-- Membership tiers section -->
      <section class="membership-tier-ALL" aria-label="Membership plans">
        <!-- Tier 1: $3/month -->
        <article class="membership-tiers" aria-label="$3 per month membership tier">
          <div class="div" aria-hidden="true"></div>
          <h2 class="text-wrapper-2">$3/month</h2>
          <div class="rectangle-2" aria-hidden="true"></div>
          <button class="text-wrapper-3" type="button" aria-label="Purchase $3 per month membership">Purchase</button>
          <p class="text-wrapper-4">Unlocks all content</p>
        </article>
        <!-- Tier 2: $5/month -->
        <article class="membership-tiers-2" aria-label="$5 per month membership tier">
          <div class="div" aria-hidden="true"></div>
          <h2 class="text-wrapper-2">$5/month</h2>
          <div class="rectangle-2" aria-hidden="true"></div>
          <button class="text-wrapper-3" type="button" aria-label="Purchase $5 per month membership">Purchase</button>
          <p class="text-wrapper-4">Personal shout out + previous rewards</p>
        </article>
        <!-- Tier 3: $10/month -->
        <article class="membership-tiers-3" aria-label="$10 per month membership tier">
          <div class="div" aria-hidden="true"></div>
          <h2 class="text-wrapper-2">$10/month</h2>
          <div class="rectangle-2" aria-hidden="true"></div>
          <button class="text-wrapper-3" type="button" aria-label="Purchase $10 per month membership">Purchase</button>
          <p class="text-wrapper-4">My eternal gratitude + previous rewards</p>
        </article>
      </section>
      <!-- Bottom navigation menu -->
      <nav class="navigation-menu" aria-label="Main navigation">
        <img class="img" src="img/image.svg" alt="" aria-hidden="true" />
        <img class="tempimagetcfptf" src="img/tempimagetcfptf-1.png" alt="Home" />
        <img class="loupe" src="img/loupe-1.png" alt="Search" />
        <img class="tempimagejanjv" src="img/tempimagejan3jv-1.png" alt="Notifications" />
        <img class="user" src="img/user-1.png" alt="User account" />
      </nav>
    </main>
  </body>
</html>
