<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Patreon - Explore &amp; Search</title>
    <link rel="stylesheet" href="../mobileScreenStyles/globals.css" />
    <link rel="stylesheet" href="../mobileScreenStyles/styleguide.css" />
    <link rel="stylesheet" href="../mobileScreenStyles/searchPageStyles.css" />
  </head>
  <body>
    <main class="explore-and-search">
      <!-- Logo Header -->
      <header class="logo" role="banner" aria-label="Patreon logo">
        <span class="text-wrapper-18">Patreon</span>
        <img class="line-2" src="img/line-35.svg" alt="" aria-hidden="true" />
      </header>
      <!-- Search Bar -->
      <section class="searchbar" aria-label="Search">
        <div class="rectangle-7" aria-hidden="true"></div>
        <label for="search-input" class="sr-only">Search</label>
        <span class="text-wrapper-17" aria-hidden="true">Search</span>
        <input
          id="search-input"
          class="search-input"
          type="search"
          placeholder=""
          aria-label="Search creators and content"
        />
      </section>
      <!-- Main Explore Content -->
      <section class="search-page-explore" aria-label="Explore content">
        <!-- New For You Section -->
        <h2 class="new-for-you">New for you &gt;</h2>
        <!-- New For You Grid -->
        <article class="content-card" aria-label="FrameForge - Short Films">
          <div class="rectangle" aria-hidden="true"></div>
          <img class="element" src="img/1-41-1.png" alt="FrameForge preview" />
          <span class="text-wrapper">FrameForge</span>
          <span class="text-wrapper-9">Short Films</span>
        </article>
        <article class="content-card" aria-label="Creator001 - Art Tutorials">
          <div class="rectangle-5" aria-hidden="true"></div>
          <img class="line" src="img/line4-1.png" alt="Creator001 preview" />
          <span class="text-wrapper-7">Creator001</span>
          <span class="text-wrapper-12">Art Tutorials</span>
        </article>
        <article class="content-card" aria-label="WordHaven - Poetry">
          <div class="rectangle-2" aria-hidden="true"></div>
          <img
            class="download"
            src="img/download-1.png"
            alt="WordHaven preview"
          />
          <span class="text-wrapper-3">WordHaven</span>
          <span class="text-wrapper-15">Poetry</span>
        </article>
        <article class="content-card" aria-label="PixelBrew - Gaming clips">
          <div class="rectangle-5 rectangle-5--right" aria-hidden="true"></div>
          <img
            class="download-2"
            src="img/download-2.png"
            alt="PixelBrew preview"
          />
          <span class="text-wrapper-5">PixelBrew</span>
          <span class="text-wrapper-16">Gaming clips</span>
        </article>
        <!-- Popular This Week Section -->
        <h2 class="popular-this-week">Popular this week &gt;</h2>
        <!-- Popular This Week Grid -->
        <article class="content-card" aria-label="AtlasCollective - Travel">
          <div class="div" aria-hidden="true"></div>
          <img
            class="internationaltravel"
            src="img/internationaltravel-1.png"
            alt="AtlasCollective preview"
          />
          <span class="text-wrapper-2">AtlasCollective</span>
          <span class="text-wrapper-10">Travel</span>
        </article>
        <article class="content-card" aria-label="echoverse - Storytelling">
          <div class="rectangle-4" aria-hidden="true"></div>
          <img
            class="download-3"
            src="img/download-6.png"
            alt="echoverse preview"
          />
          <span class="text-wrapper-8">echoverse</span>
          <span class="text-wrapper-13">Storytelling</span>
        </article>
        <article class="content-card" aria-label="Urbanflux - Fashion">
          <div class="rectangle-3" aria-hidden="true"></div>
          <img
            class="download-4"
            src="img/download-7.png"
            alt="Urbanflux preview"
          />
          <span class="text-wrapper-4">Urbanflux</span>
          <span class="text-wrapper-11">Fashion</span>
        </article>
        <article
          class="content-card"
          aria-label="motiondistrict - video editing"
        >
          <div class="rectangle-6" aria-hidden="true"></div>
          <img
            class="download-5"
            src="img/download-8.png"
            alt="motiondistrict preview"
          />
          <span class="text-wrapper-6">motiondistrict</span>
          <span class="text-wrapper-14">video editing</span>
        </article>
        <!-- Right column tall image -->
        <img class="img" src="img/rectangle-10.png" alt="Featured content" />
      </section>
      <!-- Bottom Navigation Menu -->
      <nav class="navigation-menu" aria-label="Main navigation">
        <img
          class="tempimagetcfptf"
          src="img/tempimagetcfptf-1.png"
          alt="Home"
        />
        <img class="loupe" src="img/loupe-1.png" alt="Search" />
        <img
          class="tempimagejanjv"
          src="img/tempimagejan3jv-1.png"
          alt="Notifications"
        />
        <img class="user" src="img/user-1.png" alt="Profile" />
        <img class="line-3" src="img/line-5.svg" alt="" aria-hidden="true" />
      </nav>
    </main>
  </body>
</html>
